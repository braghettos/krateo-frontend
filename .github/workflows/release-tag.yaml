# Krateo COMPONENT release workflow — frontend variant. The `build` job is THE canonical
# agnostic multi-platform image build (identical to every other component repo). The `crds`
# job is frontend-specific: widget CRDs are generated from the TypeScript widget definitions
# via krateoctl (npm), not Go controller-gen, so it cannot use the shared `make generate`
# entry point. It publishes to krateo-frontend-chart's crds-subchart/. CRDs are published
# WITHOUT helm.sh/resource-policy: keep, so teardown (helm uninstall) deletes them.
name: release-tag

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build & push image (multi-platform)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # the sidebar footer's "build <version> · <sha>" — without these the image
          # ships package.json's 0.0.0 and a git-less 'dev' fallback
          build-args: |
            VERSION=${{ github.ref_name }}
            APP_BUILD=${{ github.sha }}

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ steps.meta.outputs.version }}

  crds:
    name: Generate crds
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Install krateoctl v0.8.9
        run: curl -sL https://raw.githubusercontent.com/krateoplatformops/krateoctl/main/install.sh 0.8.9 | bash

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tsx, chalk
        run: |
          npm install tsx chalk

      - name: Generate crds
        run: |
          npm run generate-crds

      - name: List files in /scripts/krateoctl-output
        run: |
          ls -la ./scripts/krateoctl-output

      - name: Upload .yaml files from /scripts/krateoctl-output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-crds-yaml-files
          path: ${{ github.workspace }}/scripts/krateoctl-output/*.yaml

      # The cross-repo push CANNOT use the default GITHUB_TOKEN: it is scoped to this repo
      # (braghettos/krateo-frontend) only, so any push/PR to braghettos/krateo-frontend-chart
      # 401s ("Bad credentials" / "Permission denied"). A cross-repo token (`PAT`) is required —
      # see docs/RELEASING.md for the one-time setup (secret name + exact scopes). This step is
      # GATED on that secret: when it is absent (or empty/expired) we skip with a clear, actionable
      # log instead of hard-failing the release with a cryptic 401, and print the exact manual
      # command to run. When present, the CRD sync PR opens automatically.
      - name: Push CRDs to braghettos/krateo-frontend-chart (crds-subchart) via PR
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -eo pipefail
          cd "$GITHUB_WORKSPACE"

          # --- Gate: require the cross-repo token before touching the chart repo. -------------
          # `secrets.PAT` expands to an empty string when the secret is unset. Without this gate,
          # an empty token silently produces `https://x-access-token:@github.com/...` and the push
          # 401s deep in the step. Detect it up front and skip cleanly (exit 0) so the release
          # tag/image publish stays green and the fix is discoverable.
          if [ -z "${GH_TOKEN:-}" ]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "main")
            {
              echo "### ⚠️ Widget-CRD auto-sync SKIPPED — cross-repo token \`PAT\` is not set"
              echo ""
              echo "The default \`GITHUB_TOKEN\` cannot push to \`braghettos/krateo-frontend-chart\`"
              echo "(it is scoped to this repo only). Add a fine-grained PAT as the repo secret"
              echo "\`PAT\` — see [docs/RELEASING.md](docs/RELEASING.md) for the exact scopes."
              echo ""
              echo "Until then, sync the CRDs manually (generated CRDs are attached to this run as"
              echo "the \`frontend-crds-yaml-files\` artifact):"
              echo ""
              echo '```'
              echo "npm run generate-crds   # regenerates scripts/krateoctl-output/*.yaml for tag ${LATEST_TAG}"
              echo "# then copy scripts/krateoctl-output/*.yaml into"
              echo "# braghettos/krateo-frontend-chart:crds-subchart/templates/ and open a PR to main"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::warning title=Widget-CRD auto-sync skipped::Repo secret 'PAT' is not set; the CRD sync PR to braghettos/krateo-frontend-chart was NOT opened. See docs/RELEASING.md, or sync manually (crds attached as the frontend-crds-yaml-files artifact)."
            echo "Skipping cross-repo CRD sync: secret 'PAT' is absent/empty. Not a release-blocking failure."
            exit 0
          fi
          # ------------------------------------------------------------------------------------

          TARGET_REPO="braghettos/krateo-frontend-chart"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "main")
          BRANCH="krateoctl-${LATEST_TAG}"
          echo "Target repo: $TARGET_REPO | tag: $LATEST_TAG | branch: $BRANCH"

          # The generated CRDs must exist locally before we touch the chart repo.
          shopt -s nullglob
          LOCAL_CRDS=("$GITHUB_WORKSPACE"/scripts/krateoctl-output/*.yaml)
          if [ "${#LOCAL_CRDS[@]}" -eq 0 ]; then
            echo "ERROR: no generated CRDs found in scripts/krateoctl-output" >&2
            exit 1
          fi
          echo "Generated ${#LOCAL_CRDS[@]} CRD file(s)."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the chart repo and authenticate the push remote.
          gh repo clone "$TARGET_REPO" /tmp/chart
          cd /tmp/chart
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git"
          git fetch origin
          git checkout main
          git pull origin main

          # One-time migration: rename any legacy CRD sub-chart dir -> crds-subchart/.
          if [ ! -d crds-subchart ]; then
            if [ -d crds-chart ]; then
              echo "Migrating crds-chart/ -> crds-subchart/"
              git mv crds-chart crds-subchart
            elif [ -d crd-chart ]; then
              echo "Migrating crd-chart/ -> crds-subchart/"
              git mv crd-chart crds-subchart
            fi
          fi
          mkdir -p crds-subchart/templates

          # Refresh the CRD templates: drop the previous set, copy the freshly generated ones.
          rm -f crds-subchart/templates/*.yaml
          cp "$GITHUB_WORKSPACE"/scripts/krateoctl-output/*.yaml crds-subchart/templates/

          # Teardown-completeness: CRDs are published WITHOUT helm.sh/resource-policy: keep, so
          # `helm uninstall` of the crds-subchart release deletes them and teardown reaches a clean
          # slate (no orphan CRDs). Safe because each CRD has a single Helm owner — the dedicated
          # crds-subchart; no parent chart templates it — and the cdc no longer empty-renders on a
          # stale discovery cache (CRD-watch invalidation, cdc >= 1.0.3). Upgrades are unaffected:
          # Helm only prunes resources that leave the chart, and the CRD never leaves it. Do NOT
          # re-add keep — it silently orphans every component CRD on teardown.

          # Safety net: the old chart directories must not survive.
          if [ -d crd-chart ]; then git rm -r crd-chart; fi
          if [ -d crds-chart ]; then git rm -r crds-chart; fi

          git add -A

          if git diff --cached --quiet; then
            echo "✅ crds-subchart already matches the generated CRDs — nothing to push."
            exit 0
          fi

          echo "=== Changes to publish ==="
          git diff --cached --name-status

          # Recreate a clean per-tag branch off main, then carry the staged changes onto it.
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Deleting stale remote branch '$BRANCH'"
            git push origin --delete "$BRANCH" || true
          fi
          git checkout -b "$BRANCH"

          git commit -m "Update widget CRDs (crds-subchart) from tag ${LATEST_TAG}

          Regenerated from braghettos/krateo-frontend @ ${LATEST_TAG} via krateoctl.
          Migrates any legacy crd-chart/crds-chart -> crds-subchart (CRDs published
          without resource-policy: keep so teardown deletes them). Chart name unchanged: frontend-crd.
          Workflow run: ${GITHUB_RUN_ID}"

          git push origin "$BRANCH"

          # Open a PR against the chart repo, or update the existing one for this branch.
          PR_TITLE="Update widget CRDs (crds-subchart) — ${LATEST_TAG}"
          PR_BODY="Automated update of widget CRDs in \`crds-subchart/templates/\` from \`braghettos/krateo-frontend\` @ \`${LATEST_TAG}\` (krateoctl). Migrates any legacy \`crd-chart\`/\`crds-chart\` → \`crds-subchart\` (CRDs published without \`resource-policy: keep\` so teardown deletes them). Helm chart name unchanged: \`frontend-crd\`.

          Workflow run: \`${GITHUB_RUN_ID}\`."

          PR_STATE=$(gh pr view "$BRANCH" --repo "$TARGET_REPO" --json state -q .state 2>/dev/null || echo "NONE")
          case "$PR_STATE" in
            OPEN)
              echo "✅ Existing open PR for '$BRANCH' was updated by the push."
              ;;
            CLOSED)
              gh pr reopen "$BRANCH" --repo "$TARGET_REPO" \
                || gh pr create --title "$PR_TITLE" --body "$PR_BODY" --head "$BRANCH" --base main --repo "$TARGET_REPO"
              ;;
            *)
              gh pr create --title "$PR_TITLE" --body "$PR_BODY" --head "$BRANCH" --base main --repo "$TARGET_REPO"
              ;;
          esac
