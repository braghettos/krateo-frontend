name: release-tag

on:
  push:
    tags: [ '[0-9]+.[0-9]+.[0-9]+' ]

env:
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false # Optional: disables SBOMs if not needed
          cache-from: type=registry,ref=${{ env.GHCR_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_REPO }}:buildcache,mode=max

      - name: Inspect image
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[0]')
          docker buildx imagetools inspect "$FIRST_TAG"


  crds:
    name: Generate crds
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Install krateoctl v0.8.9
        run: curl -sL https://raw.githubusercontent.com/krateoplatformops/krateoctl/main/install.sh 0.8.9 | bash

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tsx, chalk
        run: |
          npm install tsx chalk

      - name: Generate crds
        run: |
          npm run generate-crds

      - name: List files in /scripts/krateoctl-output
        run: |
          ls -la ./scripts/krateoctl-output

      - name: Upload .yaml files from /scripts/krateoctl-output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-crds-yaml-files
          path: ${{ github.workspace }}/scripts/krateoctl-output/*.yaml

      - name: Push CRDs to braghettos/krateo-frontend-chart (crds-chart) via PR
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -eo pipefail
          cd "$GITHUB_WORKSPACE"

          TARGET_REPO="braghettos/krateo-frontend-chart"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "main")
          BRANCH="krateoctl-${LATEST_TAG}"
          echo "Target repo: $TARGET_REPO | tag: $LATEST_TAG | branch: $BRANCH"

          # The generated CRDs must exist locally before we touch the chart repo.
          shopt -s nullglob
          LOCAL_CRDS=("$GITHUB_WORKSPACE"/scripts/krateoctl-output/*.yaml)
          if [ "${#LOCAL_CRDS[@]}" -eq 0 ]; then
            echo "ERROR: no generated CRDs found in scripts/krateoctl-output" >&2
            exit 1
          fi
          echo "Generated ${#LOCAL_CRDS[@]} CRD file(s)."

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the chart repo and authenticate the push remote.
          gh repo clone "$TARGET_REPO" /tmp/chart
          cd /tmp/chart
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git"
          git fetch origin
          git checkout main
          git pull origin main

          # One-time migration: rename the legacy crd-chart/ -> crds-chart/.
          # git mv preserves Chart.yaml/values.* so the Helm chart name (frontend-crd, pinned by
          # the installer) is unchanged — only the directory moves.
          if [ -d crd-chart ] && [ ! -d crds-chart ]; then
            echo "Migrating crd-chart/ -> crds-chart/"
            git mv crd-chart crds-chart
          fi
          mkdir -p crds-chart/templates

          # Refresh the CRD templates: drop the previous set, copy the freshly generated one.
          # The new antd-fidelity kinds replace the legacy ones (legacy CRs are migrated separately).
          rm -f crds-chart/templates/*.yaml
          cp "$GITHUB_WORKSPACE"/scripts/krateoctl-output/*.yaml crds-chart/templates/

          # Safety net: the old chart directory must not survive.
          if [ -d crd-chart ]; then git rm -r crd-chart; fi

          git add -A

          if git diff --cached --quiet; then
            echo "✅ crds-chart already matches the generated CRDs — nothing to push."
            exit 0
          fi

          echo "=== Changes to publish ==="
          git diff --cached --name-status

          # Recreate a clean per-tag branch off main, then carry the staged changes onto it.
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Deleting stale remote branch '$BRANCH'"
            git push origin --delete "$BRANCH" || true
          fi
          git checkout -b "$BRANCH"

          git commit -m "Update widget CRDs (crds-chart) from tag ${LATEST_TAG}

          Regenerated from braghettos/frontend @ ${LATEST_TAG}.
          Migrates crd-chart -> crds-chart and replaces the legacy CRDs with the
          new Ant Design-fidelity widget kinds. Helm chart name unchanged: frontend-crd.
          Workflow run: ${GITHUB_RUN_ID}"

          git push origin "$BRANCH"

          # Open a PR against the chart repo, or update the existing one for this branch.
          PR_TITLE="Update widget CRDs (crds-chart) — ${LATEST_TAG}"
          PR_BODY="Automated update of widget CRDs in \`crds-chart/templates/\` from \`braghettos/frontend\` @ \`${LATEST_TAG}\`.

          - Migrates \`crd-chart\` → \`crds-chart\` (Helm chart name unchanged: \`frontend-crd\`).
          - Replaces the legacy CRDs with the regenerated Ant Design-fidelity widget kinds.

          Workflow run: \`${GITHUB_RUN_ID}\`."

          PR_STATE=$(gh pr view "$BRANCH" --repo "$TARGET_REPO" --json state -q .state 2>/dev/null || echo "NONE")
          case "$PR_STATE" in
            OPEN)
              echo "✅ Existing open PR for '$BRANCH' was updated by the push."
              ;;
            CLOSED)
              gh pr reopen "$BRANCH" --repo "$TARGET_REPO" \
                || gh pr create --title "$PR_TITLE" --body "$PR_BODY" --head "$BRANCH" --base main --repo "$TARGET_REPO"
              ;;
            *)
              gh pr create --title "$PR_TITLE" --body "$PR_BODY" --head "$BRANCH" --base main --repo "$TARGET_REPO"
              ;;
          esac
