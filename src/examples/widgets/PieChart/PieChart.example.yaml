# Empty data — renders the <Empty/> placeholder.
kind: PieChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-piechart-empty
  namespace: krateo-system
spec:
  widgetData:
    data: []
    angleField: value
    colorField: type
---
# Pie (@ant-design/charts Pie): a flat `data` array + angle/color field mappings.
kind: PieChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-piechart
  namespace: krateo-system
spec:
  widgetData:
    data:
      - { type: Running, value: 8 }
      - { type: Pending, value: 2 }
      - { type: Failed, value: 1 }
    angleField: value
    colorField: type
    legend: true
