# Composable Form: instead of the schema/stringSchema generator, the Form provides
# the antd Form context + submit and COMPOSES child form-control widgets
# (Input/Select/Switch/...). Each control binds its value by `name`; on submit the
# Form collects them and runs the rest action.
kind: Form
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-form-composable
  namespace: krateo-system
spec:
  widgetData:
    layout: vertical
    submitActionId: submit-form
    items:
      - resourceRefId: field-name
      - resourceRefId: field-environment
      - resourceRefId: field-autosync
    actions:
      rest:
        - id: submit-form
          type: rest
          resourceRefId: create-deployment
          headers:
            - "Content-Type: application/json"
    buttonConfig:
      primary:
        label: Create
  resourcesRefs:
    items:
      - id: field-name
        allowed: true
        path: "/call?resource=inputs&apiVersion=widgets.templates.krateo.io/v1beta1&name=field-name&namespace=krateo-system"
      - id: field-environment
        allowed: true
        path: "/call?resource=selects&apiVersion=widgets.templates.krateo.io/v1beta1&name=field-environment&namespace=krateo-system"
      - id: field-autosync
        allowed: true
        path: "/call?resource=switches&apiVersion=widgets.templates.krateo.io/v1beta1&name=field-autosync&namespace=krateo-system"
      - id: create-deployment
        allowed: true
        path: "/call?resource=restactions&apiVersion=templates.krateo.io/v1alpha1&name=create-deployment&namespace=krateo-system"
