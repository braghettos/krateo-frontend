# Empty data — renders the <Empty/> placeholder.
kind: BarChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-barchart-empty
  namespace: krateo-system
spec:
  widgetData:
    data: []
    xField: namespace
    yField: count
---
# Column chart (@ant-design/charts Column — vertical bars): a flat `data` array + field mappings.
kind: BarChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-barchart
  namespace: krateo-system
spec:
  widgetData:
    data:
      - { namespace: default, count: 12 }
      - { namespace: kube-system, count: 30 }
      - { namespace: krateo-system, count: 18 }
    xField: namespace
    yField: count
    colorField: namespace
