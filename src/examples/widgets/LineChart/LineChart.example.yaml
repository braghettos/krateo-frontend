# Empty data — renders the <Empty/> placeholder.
kind: LineChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-linechart-empty
  namespace: krateo-system
spec:
  widgetData:
    data: []
    xField: time
    yField: value
---
# Multi-series line (@ant-design/charts Line): a flat `data` array + field mappings.
kind: LineChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-linechart
  namespace: krateo-system
spec:
  widgetData:
    data:
      - { time: "00:00", value: 22, metric: Temperature }
      - { time: "01:00", value: 24, metric: Temperature }
      - { time: "02:00", value: 21, metric: Temperature }
      - { time: "00:00", value: 45, metric: Humidity }
      - { time: "01:00", value: 48, metric: Humidity }
      - { time: "02:00", value: 50, metric: Humidity }
    xField: time
    yField: value
    colorField: metric
    shapeField: smooth
    legend: true
