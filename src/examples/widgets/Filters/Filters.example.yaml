# Filters composes form-control widgets as filter fields. Each control's `name`
# is the dotted data path it filters; on Apply, the values are pushed to widgets
# that share the same `prefix` (the match strategy is inferred from the value type).
kind: Filters
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: example-filters
  namespace: krateo-system
spec:
  widgetData:
    prefix: pods
    items:
      - resourceRefId: filter-name
      - resourceRefId: filter-status
  resourcesRefs:
    items:
      - id: filter-name
        allowed: true
        path: "/call?resource=inputs&apiVersion=widgets.templates.krateo.io/v1beta1&name=filter-name&namespace=krateo-system"
      - id: filter-status
        allowed: true
        path: "/call?resource=selects&apiVersion=widgets.templates.krateo.io/v1beta1&name=filter-status&namespace=krateo-system"
