# Krateo portal SPA — upstream nginx (official image) server block, deployed to
# /etc/nginx/conf.d/default.conf. Serves the built SPA and reverse-proxies /autopilot/* to the
# kagent A2A endpoint on the SAME origin (no cross-origin request / no CORS preflight; see #50).
# The chart mounts the runtime config.json at /app/config, so the doc root MUST be /app.
server {
  listen       80;
  server_name  _;
  root   /app;
  index  index.html index.htm;

  # Autopilot copilot (optional): same-origin reverse proxy to the kagent A2A endpoint.
  # kagent-ui is resolved at REQUEST time (variable proxy_pass + resolver), NOT at boot — so the
  # portal starts even when kagent/Autopilot is absent or temporarily down; /autopilot/ then returns
  # 502 instead of nginx failing to start and taking down the WHOLE portal UI. (D6, 2026-07-08: the
  # frontend nginx crashlooped with `host not found in upstream "kagent-ui..."` while kagent was down,
  # cascading a full portal-UI outage.) The resolver IP is injected from /etc/resolv.conf by
  # /docker-entrypoint.d/40-krateo-resolver.sh. The `rewrite` reproduces the URI mapping that a
  # literal proxy_pass does implicitly (a variable proxy_pass does not rewrite the location prefix).
  location /autopilot/ {
    resolver __NGINX_RESOLVER__ valid=10s ipv6=off;
    set $autopilot_upstream "kagent-ui.krateo-system.svc.cluster.local";
    rewrite ^/autopilot/(.*)$ /api/a2a/krateo-system/krateo-autopilot/$1 break;
    # Port 80 is the kagent-ui SERVICE port (it maps to the pod's targetPort 8080). Dialing :8080
    # here hits a non-existent Service port → the SYN blackholes → proxy_connect_timeout (default
    # 60s) fires → 504 on EVERY rail request (fixed 2026-07-17; the Service has never exposed 8080).
    proxy_pass http://$autopilot_upstream:80;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;        # SSE: stream frames as they arrive, do not buffer
    proxy_connect_timeout 10s;  # fail fast (502) if kagent-ui is unreachable — never hang ~60s on a bad connect
    proxy_send_timeout 1h;      # match the read timeout for long-lived request/stream symmetry
    proxy_read_timeout 1h;      # long-lived agent stream
  }

  location / {
    try_files $uri /index.html;
  }
}
