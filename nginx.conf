# Autopilot copilot (optional): same-origin reverse proxy to the kagent A2A endpoint.
# The browser calls /autopilot/* on THIS origin, so there is no cross-origin request and
# no CORS preflight — which is exactly what kagent-ui omits on /api/a2a (see #50). The
# upstream is cluster DNS (this pod runs in-cluster), so it is drift-proof, unlike the
# external LB IPs the other backends use.
#
# kagent-ui is resolved at REQUEST time (variable proxy_pass + resolver), NOT at boot — so the
# portal starts even when kagent/Autopilot is absent or temporarily down; /autopilot/ then returns
# 502 instead of nginx failing to start and taking down the WHOLE portal UI. (D6, 2026-07-08: the
# frontend nginx crashlooped with `host not found in upstream "kagent-ui..."` while kagent was down,
# cascading a full portal-UI outage.) The resolver IP is injected from /etc/resolv.conf by
# docker-entrypoint.sh. The `rewrite` reproduces the URI mapping that a literal proxy_pass does
# implicitly (a variable proxy_pass does not rewrite the location prefix on its own).
location /autopilot/ {
  resolver __NGINX_RESOLVER__ valid=10s ipv6=off;
  set $autopilot_upstream "kagent-ui.krateo-system.svc.cluster.local";
  rewrite ^/autopilot/(.*)$ /api/a2a/krateo-system/krateo-autopilot/$1 break;
  proxy_pass http://$autopilot_upstream:8080;
  proxy_http_version 1.1;
  proxy_set_header Connection '';
  proxy_buffering off;        # SSE: stream frames as they arrive, do not buffer
  proxy_read_timeout 1h;      # long-lived agent stream
}

location / {
  root   /app;
  index  index.html index.htm;
  try_files $uri /index.html;
}
