# Autopilot copilot (optional): same-origin reverse proxy to the kagent A2A endpoint.
# The browser calls /autopilot/* on THIS origin, so there is no cross-origin request and
# no CORS preflight — which is exactly what kagent-ui omits on /api/a2a (see #50). The
# upstream is cluster DNS (this pod runs in-cluster), so it is drift-proof, unlike the
# external LB IPs the other backends use.
# NOTE: presupposes kagent-ui exists in-cluster. If you deploy the portal WITHOUT
# kagent/Autopilot, omit this block — nginx will not start if the upstream name cannot
# be resolved at boot.
location /autopilot/ {
  proxy_pass http://kagent-ui.krateo-system.svc.cluster.local:8080/api/a2a/krateo-system/krateo-autopilot/;
  proxy_http_version 1.1;
  proxy_set_header Connection '';
  proxy_buffering off;        # SSE: stream frames as they arrive, do not buffer
  proxy_read_timeout 1h;      # long-lived agent stream
}

location / {
  root   /app;
  index  index.html index.htm;
  try_files $uri /index.html;
}